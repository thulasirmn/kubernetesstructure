apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.serviceName }}
  namespace: {{ .Release.Namespace }}
  labels:
    srw.io/session-id: {{ .Values.sessionId | quote }}
    srw.io/workspace-id: {{ .Values.workspaceId | quote }}
    srw.io/app: {{ .Values.appType | quote }}
    app: {{ .Values.deploymentName | quote }}
spec:
  type: ClusterIP
  selector:
    app: {{ .Values.deploymentName | quote }}
  ports:
    - port: 80
      targetPort: {{ .Values.containerPort }}
      protocol: TCP
